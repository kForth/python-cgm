name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-quality:
    name: Lint, type-check, test, and build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest mypy ruff build

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy cgm

      - name: Run pytest
        run: pytest -q

      - name: Verify build
        run: python -m build
